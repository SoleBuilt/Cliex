name: fastapi-setup
description: A FastAPI project setup with virtual environment and dependencies.
steps:
- type: run
  name: create-venv
  cmd: python -m venv .venv

- type: run
  name: open-venv
  when: windows
  cmd: .venv\Scripts\activate

- type: run
  name: install-deps
  cmd: 'pip install "fastapi[standard]"'

- type: run
  name: run-server
  cmd: fastapi dev