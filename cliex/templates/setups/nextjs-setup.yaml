steps:
  - type: run
    name: create-next-app
    cmd: npx create-next-app@latest . --typescript --tailwind --eslint --app --yes

  - type: run
    name: install-packages
    cmd: npm install firebase date-fns next-themes zod react-hook-form @hookform/resolvers zustand @tanstack/react-query

  - type: run
    name: shadcn-init
    cmd: npx shadcn@latest init --preset b3kILCNiD --template next --rtl --pointer --yes

  - type: run
    name: shadcn-add
    cmd: npx shadcn@latest add alert avatar badge button button-group card dialog dropdown-menu field input input-group label form scroll-area select separator sheet sidebar skeleton table tabs textarea tooltip --yes

  # Install agent skill
  - type: run
    name: install-agent-skill-shadcn-ui
    cmd: npx skills add shadcn/ui --agents claude --yes

  - type: run
    name: update-agent-skill-ui-ux-pro-max
    cmd: npm install -g uipro-cli

  - type: run
    name: install-agent-skill-ui-ux-pro-max
    cmd: uipro init --ai antigravity

  # Copy skill ui-ux-pro-max vào trong folder .agent + xóa folder thừa
  - type: run
    name: copy-agents-to-agent
    cmd: xcopy .agents\skills .agent\skills /E /Y

  - type: run
    name: remove-agents-folder
    cmd: rmdir .agents /s /q

  # thêm .agents vào file .gitignore
  - type: append
    name: gitignore-agents
    file: .gitignore
    content: |
      # Ignore agents folder
      .agent

  # Git
  - type: run
    name: git-config-username
    cmd: git config --global user.name 'DucHuynhTrung'

  - type: run
    name: git-config-email
    cmd: git config --global user.email 'huynhtrungduc.growth@gmail.com'

  - type: run
    name: git-add
    cmd: git add .

  - type: run
    name: git-commit
    cmd: 'git commit -m "Cliex: Initialize project setup"'
