name: nextjs-setup
description: A Next.js project setup with TypeScript, Tailwind CSS, ESLint, Shadcn UI, Firebase, and agent skills.
steps:
  - type: run
    name: create-next-app
    cmd: npx --yes create-next-app@latest . --typescript --tailwind --eslint --app --yes

  - type: run
    name: install-packages
    cmd: npm install firebase date-fns next-themes zod react-hook-form @hookform/resolvers zustand @tanstack/react-query

  - type: run
    name: shadcn-init
    cmd: npx --yes shadcn@latest init --preset b3kILCNiD --template next --rtl --pointer --yes

  - type: run
    name: shadcn-add
    cmd: npx --yes shadcn@latest add alert avatar badge button button-group card dialog dropdown-menu field input input-group label form scroll-area select separator sheet sidebar skeleton table tabs textarea tooltip --overwrite --yes

  # Install agent skill
  - type: run
    name: install-agent-skill-shadcn-ui
    cmd: npx --yes skills add shadcn/ui --agents claude --yes

  - type: run
    name: update-agent-skill-ui-ux-pro-max
    cmd: npm install -g uipro-cli

  - type: run
    name: install-agent-skill-ui-ux-pro-max
    cmd: uipro init --ai antigravity

  # Copy skill ui-ux-pro-max vào trong folder .agent + xóa folder thừa
  - type: copy
    name: copy-agents-to-agent
    src: .agents/skills
    dest: .agent/skills

  - type: remove
    name: remove-agents-folder
    path: .agents

  # thêm .agents vào file .gitignore
  - type: append
    name: gitignore-agents
    file: .gitignore
    content: |
      # Ignore agents folder
      .agent

  # Git (uses the user's own configured git identity)
  - type: git
    name: git-config
    username: "{{ git_username }}"
    email: "{{ git_email }}"

  - type: run
    name: git-add
    cmd: git add .

  - type: run
    name: git-commit
    cmd: 'git commit -m "Cliex: Initialize project setup"'
